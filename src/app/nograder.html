<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>nograder — cafe · grade · chill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=IBM+Plex+Sans+Thai+Looped:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="components/Shell.jsx"></script>
<script type="text/babel" src="components/Dashboard.jsx"></script>
<script type="text/babel" src="components/ProblemPage.jsx"></script>
<script type="text/babel" src="components/Submissions.jsx"></script>
<script type="text/babel" src="components/HallOfFame.jsx"></script>
<script type="text/babel" src="components/PostProblem.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hofLayout": "list",
  "accent": "clay"
}/*EDITMODE-END*/;

// apply persisted accent on boot
(function applyAccent() {
  const map = { sage: "#5C7558", amber: "#A17A4E", clay: "#B8685E", ink: "#2E3A2C" };
  const c = map[TWEAK_DEFAULTS.accent] || map.clay;
  document.documentElement.style.setProperty("--sage-dark", c);
  document.documentElement.style.setProperty("--sage", c);
})();

function App() {
  const [view, setView] = useState(() => localStorage.getItem("ng_view") || "dashboard");
  const [problemId, setProblemId] = useState(() => localStorage.getItem("ng_problem") || "normal_puzzle");
  const [submissionId, setSubmissionId] = useState(() => localStorage.getItem("ng_sub") || "913662");
  const [toasts, setToasts] = useState([]);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { localStorage.setItem("ng_view", view); }, [view]);
  useEffect(() => { localStorage.setItem("ng_problem", problemId); }, [problemId]);
  useEffect(() => { localStorage.setItem("ng_sub", submissionId); }, [submissionId]);

  // edit mode protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const pushTweak = (k, v) => {
    setTweaks((t) => ({ ...t, [k]: v }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const addToast = (t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts((ts) => [...ts, { ...t, id }]);
    setTimeout(() => setToasts((ts) => ts.filter((x) => x.id !== id)), 5200);
  };

  const openProblem = (id) => {
    setProblemId(id);
    setView("problem");
  };

  const openSubmission = (id) => {
    setSubmissionId(id);
    setView("submission");
  };

  const handleSubmitFromDash = (pid, filename) => {
    const id = pid === "specified" ? "normal_puzzle" : pid;
    addToast({ title: "Submitted to the grader", msg: `${filename || "solution.cpp"} · queued for brewing`, kind: "info" });
    setTimeout(() => {
      addToast({ title: "Accepted — nicely brewed", msg: "All 10 testcases passed. 100.0 / 100", kind: "ok" });
    }, 3200);
    setProblemId(id);
    setView("problem");
  };

  let body = null;
  if (view === "dashboard")   body = <Dashboard onSubmit={handleSubmitFromDash} onOpenProblem={openProblem} />;
  else if (view === "problems") body = <AllProblems onOpen={openProblem} />;
  else if (view === "problem")  body = <ProblemPage problemId={problemId} onBack={() => setView("problems")} addToast={addToast} />;
  else if (view === "submissions") body = <SubmissionsPage onOpen={openSubmission} />;
  else if (view === "submission")  body = <SubmissionDetail submissionId={submissionId} onBack={() => setView("submissions")} />;
  else if (view === "hof")     body = <HallOfFame layout={tweaks.hofLayout} setLayout={(v) => pushTweak("hofLayout", v)} />;
  else if (view === "post")    body = <PostProblemPage addToast={addToast} />;

  return (
    <div className="app">
      <Topbar view={view} setView={setView} onBellClick={() => addToast({ title: "Barista's note", msg: "Quiz 4 is open — warm up with Latte Tree.", kind: "info" })} />
      <main className="page">{body}</main>
      <footer style={{ padding: "28px 48px", borderTop: "1px solid var(--line)", color: "var(--muted)", fontSize: 12, fontFamily: "var(--mono)", letterSpacing: "0.06em", display: "flex", justifyContent: "space-between" }}>
        <span>© 2026 nograder · brewed in chula CPE · v 4.3 chill</span>
        <span>now playing — quiet bossa nova · 68°F · sunny</span>
      </footer>
      <ToastStack toasts={toasts} />
      {tweaksOpen && <TweaksPanel tweaks={tweaks} set={pushTweak} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

function AllProblems({ onOpen }) {
  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-sub">the menu · 414 items · fresh daily</div>
          <h1 className="page-title">Problems</h1>
          <p className="page-intro">Pick what looks good. Every problem is handcrafted — filter by topic, difficulty, or what you're in the mood for.</p>
        </div>
      </div>
      <ProblemsTable onOpen={onOpen} />
    </div>
  );
}

function TweaksPanel({ tweaks, set, onClose }) {
  return (
    <div className="tweaks-panel">
      <div className="row items-center justify-between" style={{ marginBottom: 12 }}>
        <div className="tweaks-title">Tweaks</div>
        <button className="icon-btn" onClick={onClose} style={{ width: 28, height: 28 }}>✕</button>
      </div>
      <div className="tweak-row">
        <div className="field-label">Hall of Fame layout</div>
        <div className="tweak-options">
          {["grid", "podium", "list"].map((k) => (
            <button key={k} className={`tweak-opt ${tweaks.hofLayout === k ? "active" : ""}`} onClick={() => set("hofLayout", k)}>{k}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="field-label">Accent color</div>
        <div className="tweak-options">
          {[["sage","#5C7558"], ["amber","#A17A4E"], ["clay","#B8685E"], ["ink","#2E3A2C"]].map(([k, c]) => (
            <button key={k}
              className={`tweak-opt ${tweaks.accent === k ? "active" : ""}`}
              onClick={() => { set("accent", k); document.documentElement.style.setProperty("--sage-dark", c); }}
            >{k}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// boot
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
